name: Security

on:
  push:
    branches: [main, develop]
  # Run weekly to catch newly discovered vulnerabilities in existing deps
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  # Allow manual trigger
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # Yarn audit — works on any repo, no GitHub
  # Advanced Security required
  # ─────────────────────────────────────────
  audit:
    name: Yarn Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run audit
        # Yarn Classic: --level only filters output, not exit code.
        # Exit code bitmask: 1=low, 2=moderate, 4=high, 8=critical.
        # Fail only when high (8) or critical (16) vulnerabilities exist.
        run: |
          yarn audit --level high
          EXIT=$?
          if [ $EXIT -ge 8 ]; then
            echo "::warning::Yarn audit found high or critical vulnerabilities."
            echo "Run 'yarn audit' locally to review them."
            exit 1
          fi
          echo "No high or critical vulnerabilities found."
