name: Security

on:
  push:
    branches: [main, develop]
  # Run weekly to catch newly discovered vulnerabilities in existing deps
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  # Allow manual trigger
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # Yarn audit — works on any repo, no GitHub
  # Advanced Security required
  # ─────────────────────────────────────────
  audit:
    name: Yarn Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run audit
        # --level high: only fail on high/critical severity
        run: yarn audit --level high
        continue-on-error: true
        id: audit

      - name: Report audit results
        if: steps.audit.outcome == 'failure'
        run: |
          echo "::warning::Yarn audit found high or critical vulnerabilities."
          echo "Run 'yarn audit' locally to review them."
          exit 1
