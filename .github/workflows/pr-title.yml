name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-title:
    name: Validate Conventional Commit Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read

    steps:
      - name: Check PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Matches the types defined in your .cz-config.js
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            revert
          # Matches the scopes in your .cz-config.js
          scopes: |
            app
            components
            hooks
            styles
            docs
            utils
            config
            tests
            other
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.
            Example: "feat(app): add quiz attempt flow"
